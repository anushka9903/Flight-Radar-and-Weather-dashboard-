name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check app/ tests/
      - run: ruff format --check app/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install mypy types-redis pydantic pydantic-settings
      - run: mypy app/ --ignore-missing-imports

  test:
    name: Tests
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: "test-secret-key-that-is-at-least-32-chars"
      OPENWEATHER_API_KEY: "test-api-key"
      REDIS_HOST: "localhost"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --cov=app --cov-report=xml
      - uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
        continue-on-error: true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t flightradar-api:ci .
      - name: Smoke-test container
        run: |
          docker run -d --name smoke \
            -e SECRET_KEY=test-secret-key-that-is-at-least-32-chars \
            -e OPENWEATHER_API_KEY=test \
            -e REDIS_HOST=localhost \
            -p 8000:8000 \
            flightradar-api:ci
          sleep 10
          curl -f http://localhost:8000/health/live || (docker logs smoke && exit 1)
          docker stop smoke
